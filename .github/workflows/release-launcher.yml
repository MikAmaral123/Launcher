name: Release Launcher

# Déclenche la construction + publication du launcher quand tu pousses un tag "v*".
# Ex :  git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # nécessaire pour créer la Release et y attacher l'installeur

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Injecte le token de lecture du repo PRIVE du jeu depuis un secret du repo.
      # (Reglages -> Secrets and variables -> Actions -> New secret : GAME_DOWNLOAD_TOKEN)
      # Le fichier n'est jamais commite ; il est cree a la volee ici et embarque dans le build.
      - name: Inject game download token
        shell: bash
        run: |
          echo '{ "githubToken": "${{ secrets.GAME_DOWNLOAD_TOKEN }}" }' > launcher.config.local.json

      - name: Build & publish (electron-builder -> GitHub Releases)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
